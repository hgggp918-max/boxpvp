Bu Html Discord botumuz içindir !<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AD SOYAD SORGULAMA</title>
<style>
    body { font-family: monospace; background:#00060f; color:#00f0ff; padding:1rem; }
    .container { max-width: 800px; margin:auto; }
    .panel { background: rgba(0,10,20,0.85); padding:1rem; margin-bottom:1rem; border-radius:6px; }
    input { width:100%; padding:0.5rem; margin-bottom:0.5rem; background:#000; border:1px solid #00f0ff; color:#00f0ff; }
    button { width:100%; padding:0.7rem; border:2px solid #00f0ff; background:transparent; color:#00f0ff; cursor:pointer; }
    table { width:100%; margin-top:0.5rem; border-collapse: collapse; }
    td { padding:0.3rem; border-bottom:1px solid #00f0ff33; }
    .label { width:30%; font-weight:bold; color:#88ffff; text-align:right; padding-right:0.5rem; }
    .value { color:#e0ffff; }
    .error { color:#ff6666; text-align:center; }
</style>
</head>
<body>

<div class="container">

    <div class="panel">
        <h3>AD SOYAD SORGULAMA</h3>
        <input id="ad" placeholder="Ad">
        <input id="soyad" placeholder="Soyad">
        <input id="il" placeholder="İl (opsiyonel)">
        <input id="ilce" placeholder="İlçe (opsiyonel)">
        <button id="sorgula">SORGULA</button>
    </div>

    <div class="panel">
        <h3>SONUÇ</h3>
        <div id="sonuc">Henüz sorgu yok</div>
    </div>

</div>

<script>
document.getElementById("sorgula").addEventListener("click", function() {
    const ad = document.getElementById("ad").value.trim();
    const soyad = document.getElementById("soyad").value.trim();
    const il = document.getElementById("il").value.trim();
    const ilce = document.getElementById("ilce").value.trim();

    const sonucAlani = document.getElementById("sonuc");

    if(!ad && !soyad){
        sonucAlani.innerHTML = '<div class="error">Ad veya Soyad gir</div>';
        return;
    }

    sonucAlani.innerHTML = 'Sorgulanıyor...';

    // Sahte veri üret
    const data = [{
        ADI: ad,
        SOYADI: soyad,
        TCKN: "12345678901",
        DG: "01/01/1990",
        SS: il || "İstanbul",
        ANNEADI: "Ayşe",
        BABAADI: "Mehmet",
        ADRES: `${ilce || "Kadıköy"}, ${il || "İstanbul"}`
    }];

    // HTML oluştur
    let html = `<div>Toplam ${data.length} kayıt</div>`;
    data.forEach((item, i) => {
        html += `<table>
            <tr><td class="label">#</td><td class="value">${i+1}</td></tr>
            <tr><td class="label">Ad</td><td class="value">${item.ADI}</td></tr>
            <tr><td class="label">Soyad</td><td class="value">${item.SOYADI}</td></tr>
            <tr><td class="label">TCKN</td><td class="value">${item.TCKN}</td></tr>
            <tr><td class="label">Doğum</td><td class="value">${item.DG}</td></tr>
            <tr><td class="label">İl</td><td class="value">${item.SS}</td></tr>
            <tr><td class="label">Anne</td><td class="value">${item.ANNEADI}</td></tr>
            <tr><td class="label">Baba</td><td class="value">${item.BABAADI}</td></tr>
            <tr><td class="label">Adres</td><td class="value">${item.ADRES}</td></tr>
        </table>`;
    });

    sonucAlani.innerHTML = html;
});
</script>

</body>
</html>
